version: '3.8'

services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/database
      - REDIS_URL=redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=database
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:6
    restart: always

volumes:
  db-data:
